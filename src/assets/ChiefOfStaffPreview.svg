<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <radialGradient id="cosGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e9a23b" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#e9a23b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cosDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="#0a0a0b"/>
  <rect width="1200" height="750" fill="url(#cosDots)"/>
  <circle cx="640" cy="300" r="320" fill="url(#cosGlow)"/>

  <!-- header label -->
  <g fill="#5e5e60" font-size="15" letter-spacing="4">
    <circle cx="80" cy="78" r="4" fill="#e9a23b"/>
    <text x="98" y="84">LOCAL-FIRST · PERSONAL AI</text>
  </g>

  <!-- title -->
  <text x="80" y="180" fill="#ededed" font-family="'Space Grotesk', sans-serif" font-size="70" font-weight="700" letter-spacing="-2">Chief of Staff</text>
  <text x="80" y="232" fill="#9a9a9a" font-family="'Space Grotesk', sans-serif" font-size="26">A sentence in. Real action out.</text>

  <!-- edges -->
  <g stroke="#2a2a2c" stroke-width="2" fill="none">
    <path d="M230 430 H330"/>
    <path d="M500 430 H600"/>
    <path d="M770 430 C 840 430, 840 360, 910 360"/>
    <path d="M770 430 H910"/>
    <path d="M770 430 C 840 430, 840 500, 910 500"/>
  </g>
  <!-- active amber edge -->
  <path d="M230 430 H330" stroke="#e9a23b" stroke-width="2.5" fill="none"/>
  <circle cx="305" cy="430" r="5" fill="#e9a23b"/>

  <!-- nodes -->
  <g font-size="16" letter-spacing="1">
    <!-- webhook (active) -->
    <rect x="80" y="400" width="150" height="60" rx="2" fill="#0e0e10" stroke="#e9a23b" stroke-width="1.5"/>
    <text x="100" y="436" fill="#ededed" font-family="'Space Grotesk', sans-serif">Webhook</text>

    <rect x="350" y="400" width="150" height="60" rx="2" fill="#0e0e10" stroke="#2a2a2c"/>
    <text x="370" y="436" fill="#ededed" font-family="'Space Grotesk', sans-serif">Intake</text>

    <rect x="620" y="400" width="150" height="60" rx="2" fill="#0e0e10" stroke="#2a2a2c"/>
    <text x="640" y="436" fill="#ededed" font-family="'Space Grotesk', sans-serif">Master</text>

    <rect x="910" y="330" width="190" height="56" rx="2" fill="#0e0e10" stroke="#2a2a2c"/>
    <text x="930" y="364" fill="#9a9a9a" font-size="15">Calendar</text>

    <rect x="910" y="402" width="190" height="56" rx="2" fill="#0e0e10" stroke="#2a2a2c"/>
    <text x="930" y="436" fill="#9a9a9a" font-size="15">Gmail</text>

    <rect x="910" y="474" width="190" height="56" rx="2" fill="#0e0e10" stroke="#2a2a2c"/>
    <text x="930" y="508" fill="#9a9a9a" font-size="15">Tavily</text>
  </g>

  <!-- result card -->
  <g>
    <rect x="80" y="560" width="430" height="120" rx="2" fill="#0e0e10" stroke="#e9a23b" stroke-width="1.5"/>
    <text x="104" y="598" fill="#5e5e60" font-size="13" letter-spacing="3">CALENDAR · CREATED</text>
    <text x="104" y="630" fill="#ededed" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="600">Aanya's Birthday</text>
    <text x="104" y="658" fill="#9a9a9a" font-size="15">Tue, Jul 22 · All day</text>
  </g>
</svg>
