<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Harsh Gupta</title>
    <script>
      // Single-page app redirect — github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep = 0 (user/org site: username.github.io)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(0, 1 + 0).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
